name: CI - Develop (Tests)

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ./matchqueue-service.sln
    
    - name: Build
      run: dotnet build ./matchqueue-service.sln --no-restore

    - name: Test with coverage
      run: |
        dotnet test ./matchqueue-service.sln --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutput=./TestResults/coverage.opencover.xml \
          /p:CoverletOutputFormat=opencover
