name: CI - Main (Build, Test & Sonar)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore ./matchqueue-service.sln

    - name: Begin SonarCloud analysis
      run: |
        dotnet sonarscanner begin \
          /k:"shopisel_matchqueue-service" \
          /o:"shopisel" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml"

    - name: Build
      run: dotnet build ./matchqueue-service.sln --no-restore

    - name: Test with coverage
      run: |
        dotnet test ./matchqueue-service.sln --no-build --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutput=./TestResults/coverage.opencover.xml \
          /p:CoverletOutputFormat=opencover

    - name: End SonarCloud analysis
      run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

