name: Final Worker (repository_dispatch)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Upstream orchestrator run id to process"
        required: false
        type: string
        default: ""
      started_at:
        description: "UTC datetime or unix seconds (optional)"
        required: false
        type: string
        default: ""
      finished_at:
        description: "UTC datetime or unix seconds (optional)"
        required: false
        type: string
        default: ""
      any_failed:
        description: "Continue even if upstream failed"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  final-worker:
    name: Run final worker
    runs-on: ubuntu-latest
    env:
      ConnectionStrings__MatchQueueService: ${{ secrets.MATCHQUEUE_CONNECTION_STRING }}
      Mongo__ConnectionString: ${{ secrets.MONGO_CONNECTION_STRING }}
      Mongo__Database: ${{ secrets.MONGO_DATABASE }}
      MATCHQUEUE_FALLBACK_LATEST_RUN: true
      MATCHQUEUE_LATEST_RUN_MAX_AGE_MINUTES: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./matchqueue-service.sln

      - name: Build
        run: dotnet build ./matchqueue-service.sln --configuration Release --no-restore

      - name: Run worker
        run: dotnet run --project ./src/MatchQueueService/MatchQueueService.csproj --configuration Release --no-build -- --mode worker

  trigger-fcm-worker:
    name: Trigger FCM worker (repository_dispatch)
    runs-on: ubuntu-latest
    needs: [final-worker]
    if: ${{ needs.final-worker.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Validate dispatch token
        shell: bash
        run: |
          if [[ -z "${{ secrets.FCM_WORKER_DISPATCH_TOKEN }}" ]]; then
            echo "FCM_WORKER_DISPATCH_TOKEN not set; skipping trigger."
            echo "SKIP_TRIGGER=true" >> "$GITHUB_ENV"
          fi
      - name: Trigger fcm-notification-worker (repository_dispatch)
        if: env.SKIP_TRIGGER != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FCM_WORKER_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'shopisel',
              repo: 'fcm-notification-worker',
              event_type: 'matchqueue_finished',
              client_payload: {
                source_repo: process.env.GITHUB_REPOSITORY,
                source_run_id: process.env.GITHUB_RUN_ID,
              },
            });
